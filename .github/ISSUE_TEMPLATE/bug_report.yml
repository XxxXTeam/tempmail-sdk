name: Bug 报告
description: 报告一个 Bug 或异常行为
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间报告 Bug！请尽可能详细地描述问题，以便我们快速定位和修复。

  - type: dropdown
    id: sdk
    attributes:
      label: SDK 类型
      description: 你使用的是哪个 SDK？
      options:
        - Go
        - npm (TypeScript)
        - Rust
        - Python
        - C
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SDK 版本
      description: "SDK 版本号（如 1.1.0）"
      placeholder: "1.1.0"
    validations:
      required: true

  - type: dropdown
    id: channel
    attributes:
      label: 相关渠道
      description: 问题涉及哪个临时邮箱渠道？（如不确定可选"全部/不确定"）
