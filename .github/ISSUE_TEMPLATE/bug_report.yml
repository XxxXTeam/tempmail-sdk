  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 简明扼要地描述 Bug 的表现
      placeholder: "调用 generateEmail 时返回空地址..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 详细的复现步骤
      value: |
        1. 调用 `...`
        2. 传入参数 `...`
        3. 观察到 `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望的正确行为是什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？请附上错误信息或日志
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 运行环境
      description: 请提供你的运行环境信息
      value: |
        - 操作系统：
        - 语言/运行时版本：
        - SDK 版本：
        - 是否使用代理：
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 日志输出
      description: 开启 Debug 日志后的相关输出（可选）
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他可能有助于定位问题的信息，如截图、代码片段等
    validations:
      required: false
