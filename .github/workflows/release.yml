name: 发布

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release-meta:
    name: 解析发布元数据
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - id: meta
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # 主版本后带 - 预发布段（npm/PEP440/cargo 均支持），如 1.0.0-beta.1、1.0.0-rc.0
          if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
  create-go-module-tag:
    name: 创建 Go 模块标签
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 获取版本号
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: 创建 Go 子目录模块标签
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          GO_TAG="sdk/go/${{ steps.version.outputs.VERSION }}"
          echo "创建 Go 模块标签: ${GO_TAG}"
          git tag "${GO_TAG}" || true
          git push origin "${GO_TAG}" || true
  verify-go:
    name: 验证 Go SDK
    runs-on: ubuntu-latest
    needs: [create-go-module-tag]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'
          cache: false
      - name: Go 构建验证
        working-directory: sdk/go
        run: |
          go vet ./...
          go build ./...
      - name: example 模块（与发布交叉编译一致）
        working-directory: sdk/go/example
        run: |
          go mod tidy
          go build -o /dev/null .

  verify-npm:
    name: 验证 Node.js SDK
    runs-on: ubuntu-latest
    needs: [create-go-module-tag]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm 构建验证
        working-directory: sdk/npm
        run: |
          npm install
          npx tsc --noEmit
          npm run build

  verify-rust:
    name: 验证 Rust SDK
    runs-on: ubuntu-latest
    needs: [create-go-module-tag]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust 构建验证
        working-directory: sdk/rust
        run: cargo build

  verify-python:
    name: 验证 Python SDK
    runs-on: ubuntu-latest
    needs: [create-go-module-tag]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Python 构建验证
        working-directory: sdk/python
        run: |
          pip install build
          python -m build

  verify-c:
    name: 验证 C SDK
    runs-on: ubuntu-latest
    needs: [create-go-module-tag]
    steps:
      - uses: actions/checkout@v4
      - name: C 构建验证
        working-directory: sdk/c
        run: |
          sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
          curl -L -o vendor/cJSON.h https://raw.githubusercontent.com/DaveGamble/cJSON/master/cJSON.h
          curl -L -o vendor/cJSON.c https://raw.githubusercontent.com/DaveGamble/cJSON/master/cJSON.c
          cmake -B build -S .
          cmake --build build

  verify-php:
    name: 验证 PHP SDK
    runs-on: ubuntu-latest
    needs: [create-go-module-tag]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
      - name: PHP 构建验证
        working-directory: sdk/php
        run: |
          composer install --no-interaction --prefer-dist
          find src -name "*.php" -exec php -l {} \;
          composer dump-autoload --optimize --strict-psr

  verify-csharp:
    name: 验证 C# SDK
    runs-on: ubuntu-latest
    needs: [create-go-module-tag]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'
      - name: C# 构建验证
        working-directory: sdk/csharp/src
        run: |
          dotnet restore
          dotnet build --no-restore -c Release

  verify-ruby:
    name: 验证 Ruby SDK
    runs-on: ubuntu-latest
    needs: [create-go-module-tag]
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
      - name: Ruby 构建验证
        working-directory: sdk/ruby
        run: |
          find lib -name "*.rb" -exec ruby -c {} \;
          gem build tempmail_sdk.gemspec

  verify-java:
    name: 验证 Java SDK
    runs-on: ubuntu-latest
    needs: [create-go-module-tag]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Java 构建验证
        working-directory: sdk/java
        run: mvn compile -B -q
  verify-kotlin:
    name: 验证 Kotlin SDK
    runs-on: ubuntu-latest
    needs: [create-go-module-tag]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: 缓存 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('sdk/kotlin/gradle/wrapper/gradle-wrapper.properties', 'sdk/kotlin/build.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Kotlin 构建验证
        working-directory: sdk/kotlin
        run: |
          chmod +x ./gradlew
          ./gradlew build
  publish-npm:
    name: 发布 npm 包
    runs-on: ubuntu-latest
    needs: [verify-npm, release-meta]
    defaults:
      run:
        working-directory: sdk/npm
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      
      - name: 获取版本号
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: 更新 package.json 版本
        run: npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version --allow-same-version
      
      - name: 安装依赖
        run: npm install
      
      - name: 构建
        run: npm run build
      
      - name: 发布到 npm
        run: |
          if [ "${{ needs.release-meta.outputs.is_prerelease }}" = "true" ]; then
            npm publish --access public --tag beta
          else
            npm publish --access public
          fi
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
  publish-github-packages:
    name: 发布到 GitHub Packages
    runs-on: ubuntu-latest
    needs: [verify-npm, release-meta]
    permissions:
      packages: write
      contents: read
    defaults:
      run:
        working-directory: sdk/npm
    
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@XxxXTeam'
      
      - name: 获取版本号
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: 更新 package.json 版本与 scope
        run: |
          npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version --allow-same-version
          node -e "
            const pkg = require('./package.json');
            pkg.name = '@XxxXTeam/tempmail-sdk';
            pkg.publishConfig = { registry: 'https://npm.pkg.github.com' };
            require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      
      - name: 安装依赖
        run: npm install
      
      - name: 构建
        run: npm run build
      
      - name: 发布到 GitHub Packages
        run: |
          if [ "${{ needs.release-meta.outputs.is_prerelease }}" = "true" ]; then
            npm publish --access public --tag beta
          else
            npm publish --access public
          fi
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  publish-crates:
    name: 发布到 crates.io
    runs-on: ubuntu-latest
    needs: [verify-rust, release-meta]
    defaults:
      run:
        working-directory: sdk/rust

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Rust 环境
        uses: dtolnay/rust-toolchain@stable

      - name: 获取版本号
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: 更新 Cargo.toml 版本
        run: sed -i "s/^version = .*/version = \"${{ steps.version.outputs.VERSION }}\"/" Cargo.toml

      - name: 发布到 crates.io
        run: cargo publish --allow-dirty
        continue-on-error: true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
  publish-pypi:
    name: 发布到 PyPI
    runs-on: ubuntu-latest
    needs: [verify-python, release-meta]
    defaults:
      run:
        working-directory: sdk/python

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 获取版本号
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: 更新 pyproject.toml 版本
        run: sed -i "s/^version = .*/version = \"${{ steps.version.outputs.VERSION }}\"/" pyproject.toml

      - name: 安装构建工具
        run: pip install build twine

      - name: 构建
        run: python -m build

      - name: 发布到 PyPI
        run: twine upload dist/* --skip-existing
        continue-on-error: true
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      - name: 上传 Python wheel 到构建产物
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: sdk/python/dist/*.whl

  publish-nuget:
    name: 发布到 NuGet
    runs-on: ubuntu-latest
    needs: [verify-csharp, release-meta]
    defaults:
      run:
        working-directory: sdk/csharp/src

    steps:
      - uses: actions/checkout@v4

      - name: 设置 .NET 环境
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: 获取版本号
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: 更新版本号
        run: sed -i "s/<Version>.*<\/Version>/<Version>${{ steps.version.outputs.VERSION }}<\/Version>/" XxxXTeam.TempMail.csproj

      - name: 构建与打包
        run: |
          dotnet restore
          dotnet build --no-restore -c Release
          dotnet pack --no-build -c Release -o ./nupkg

      - name: 发布到 NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        continue-on-error: true

      - name: 上传 NuGet 包
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: sdk/csharp/src/nupkg/*.nupkg
  publish-rubygems:
    name: 发布到 RubyGems
    runs-on: ubuntu-latest
    needs: [verify-ruby, release-meta]
    defaults:
      run:
        working-directory: sdk/ruby

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Ruby 环境
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: 获取版本号
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: 更新版本号
        run: |
          sed -i "s/VERSION = .*/VERSION = \"${{ steps.version.outputs.VERSION }}\"/" lib/tempmail_sdk/version.rb

      - name: 构建 gem
        run: gem build tempmail_sdk.gemspec

      - name: 发布到 RubyGems
        run: |
          mkdir -p ~/.gem
          echo "---" > ~/.gem/credentials
          echo ":rubygems_api_key: ${{ secrets.RUBYGEMS_API_KEY }}" >> ~/.gem/credentials
          chmod 0600 ~/.gem/credentials
          gem push *.gem
        continue-on-error: true

      - name: 上传 gem 包
        uses: actions/upload-artifact@v4
        with:
          name: ruby-gem
          path: sdk/ruby/*.gem
  publish-packagist:
    name: 打包 PHP SDK
    runs-on: ubuntu-latest
    needs: [verify-php, release-meta]
    defaults:
      run:
        working-directory: sdk/php

    steps:
      - uses: actions/checkout@v4

      - name: 设置 PHP 环境
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: 安装依赖
        run: composer install --no-interaction --prefer-dist

      - name: 验证 composer.json
        run: composer validate --strict

      - name: 构建 archive
        run: |
          composer archive --format=zip --file=tempmail-sdk-php-${{ needs.release-meta.outputs.version }}
          mkdir -p dist
          mv *.zip dist/

      - name: 上传 PHP 包
        uses: actions/upload-artifact@v4
        with:
          name: php-package
          path: sdk/php/dist/*.zip
  publish-maven:
    name: 发布到 Maven Central
    runs-on: ubuntu-latest
    needs: [verify-java, release-meta]
    defaults:
      run:
        working-directory: sdk/java

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: 获取版本号
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: 导入 GPG 私钥
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: 更新 pom.xml 版本
        run: mvn versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} -B -q

      - name: 发布到 Maven Central（Central Portal）
        run: mvn deploy -Prelease -B -DskipTests -Dgpg.passphrase="$GPG_PASSPHRASE"
        continue-on-error: true
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: 上传 JAR 包
        uses: actions/upload-artifact@v4
        with:
          name: java-jar
          path: sdk/java/target/*.jar
  publish-kotlin:
    name: 发布 Kotlin SDK
    runs-on: ubuntu-latest
    needs: [verify-kotlin, release-meta]
    defaults:
      run:
        working-directory: sdk/kotlin

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Java 环境
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 缓存 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('sdk/kotlin/gradle/wrapper/gradle-wrapper.properties', 'sdk/kotlin/build.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: 获取版本号
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: 更新版本号
        run: sed -i "s/^version = .*/version = \"${{ steps.version.outputs.VERSION }}\"/" build.gradle.kts

      - name: 构建与发布到 Maven Central（Central Portal）
        run: |
          chmod +x ./gradlew
          ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache
        continue-on-error: true
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_TOKEN }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}

      - name: 上传 Kotlin JAR
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-jar
          path: sdk/kotlin/build/libs/*.jar
  build-go-binaries:
    name: 构建 Go 二进制 (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [verify-go]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'
          cache: false

      - name: 交叉编译
        working-directory: sdk/go/example
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go mod tidy
          output="tempmail-example-${GOOS}-${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            output="${output}.exe"
          fi
          CGO_ENABLED=0 go build -ldflags="-s -w" -o "$output" .

      - name: 打包 zip
        working-directory: sdk/go/example
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          bin="tempmail-example-${GOOS}-${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            bin="${bin}.exe"
          fi
          name="tempmail-example-${GOOS}-${GOARCH}"
          zip "dist/${name}.zip" "$bin" ../README.md

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: go-binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: sdk/go/example/dist/*.zip
  build-rust-binaries:
    name: 构建 Rust 二进制 (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [verify-rust]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tempmail-example-linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: tempmail-example-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: tempmail-example-darwin-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: tempmail-example-windows-amd64

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Rust 环境
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装交叉编译工具 (Linux ARM64)
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: 缓存 Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sdk/rust/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('sdk/rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-release-

      - name: 构建 Release 二进制
        working-directory: sdk/rust
        run: cargo build --release --example main --target ${{ matrix.target }}

      - name: 打包 (Unix)
        if: runner.os != 'Windows'
        working-directory: sdk/rust
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/examples/main dist/tempmail-example
          chmod +x dist/tempmail-example
          cd dist && zip ${{ matrix.artifact }}.zip tempmail-example ../README.md

      - name: 打包 (Windows)
        if: runner.os == 'Windows'
        working-directory: sdk/rust
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/examples/main.exe dist/tempmail-example.exe
          cd dist && 7z a ${{ matrix.artifact }}.zip tempmail-example.exe ../README.md

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: rust-${{ matrix.artifact }}
          path: sdk/rust/dist/${{ matrix.artifact }}.zip
  build-c-sdk:
    name: 构建 C SDK (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    needs: [verify-c]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: c-sdk-linux-amd64
          - os: macos-latest
            artifact: c-sdk-darwin-arm64
          - os: windows-latest
            artifact: c-sdk-windows-amd64
    defaults:
      run:
        working-directory: sdk/c

    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: 安装依赖 (macOS)
        if: runner.os == 'macOS'
        run: brew install curl

      - name: 安装依赖 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VCPKG_DEFAULT_TRIPLET: x64-windows
        run: |
          if (-not $env:VCPKG_INSTALLATION_ROOT) {
            Write-Error "VCPKG_INSTALLATION_ROOT 未设置，无法使用预装 vcpkg"
            exit 1
          }
          $vcpkg = Join-Path $env:VCPKG_INSTALLATION_ROOT 'vcpkg.exe'
          & $vcpkg install curl:x64-windows

      - name: 下载 cJSON
        shell: bash
        run: |
          curl -fsSL -o vendor/cJSON.h https://raw.githubusercontent.com/DaveGamble/cJSON/master/cJSON.h
          curl -fsSL -o vendor/cJSON.c https://raw.githubusercontent.com/DaveGamble/cJSON/master/cJSON.c
      - name: CMake 配置与构建 (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: CMake 配置与构建 (macOS)
        if: runner.os == 'macOS'
        run: |
          export CMAKE_PREFIX_PATH="$(brew --prefix curl)"
          cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: CMake 配置与构建 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VCPKG_DEFAULT_TRIPLET: x64-windows
        run: |
          $toolchain = Join-Path $env:VCPKG_INSTALLATION_ROOT 'scripts/buildsystems/vcpkg.cmake'
          cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE="$toolchain" -A x64
          cmake --build build --config Release

      - name: 打包产物 (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p pkg/include pkg/lib pkg/bin
          cp include/*.h pkg/include/
          LIBA="$(find build -name 'libtempmail_sdk.a' | head -n1)"
          BIN="$(find build -type f -name 'tempmail_example' | head -n1)"
          if [ -z "$LIBA" ] || [ ! -f "$LIBA" ]; then
            echo "::error::未找到 libtempmail_sdk.a"; find build -type f || true; exit 1
          fi
          if [ -z "$BIN" ] || [ ! -f "$BIN" ]; then
            echo "::error::未找到 tempmail_example"; find build -type f || true; exit 1
          fi
          cp "$LIBA" pkg/lib/
          cp "$BIN" pkg/bin/tempmail_example
          chmod +x pkg/bin/tempmail_example
          cp README.md pkg/
          cd pkg && zip -r ../${{ matrix.artifact }}.zip .

      - name: 打包产物 (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p pkg/include pkg/lib pkg/bin
          cp include/*.h pkg/include/
          for f in build/Release/tempmail_sdk.lib build/Release/tempmail_example.exe; do
            if [ ! -f "$f" ]; then
              echo "::error::缺少构建产物: $f"
              find build -type f || true
              exit 1
            fi
          done
          cp build/Release/tempmail_sdk.lib pkg/lib/
          cp build/Release/tempmail_example.exe pkg/bin/
          cp README.md pkg/
          cd pkg && 7z a ../${{ matrix.artifact }}.zip .

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: sdk/c/${{ matrix.artifact }}.zip
  create-release:
    name: 创建 GitHub Release
    runs-on: ubuntu-latest
    needs: [release-meta, publish-npm, publish-github-packages, publish-crates, publish-pypi, publish-nuget, publish-rubygems, publish-packagist, publish-maven, publish-kotlin, build-go-binaries, build-rust-binaries, build-c-sdk]
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      
      - name: 整理发布文件
        run: |
          mkdir -p final-assets
          find release-assets -name "*.zip" -exec cp {} final-assets/ \;
          find release-assets -name "*.whl" -exec cp {} final-assets/ \;
          ls -la final-assets/

      - name: 获取版本号
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: 生成变更日志
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -n 2 | tail -n 1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${{ steps.version.outputs.VERSION }}" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log ${PREV_TAG}..${{ steps.version.outputs.VERSION }} --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || echo "- 初始发布"
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          files: final-assets/*
          body: |
            ## 临时邮箱 SDK ${{ steps.version.outputs.VERSION }}
            
            ### 变更内容
            ${{ steps.changelog.outputs.CHANGELOG }}
            
            ### 安装方式

            #### Go
            ```bash
            go get github.com/XxxXTeam/tempmail-sdk/sdk/go@sdk/go/${{ steps.version.outputs.VERSION }}
            ```

            #### npm
            ```bash
            # 从 npmjs.org 安装
            npm install tempmail-sdk
            # 从 GitHub Packages 安装
            npm install @XxxXTeam/tempmail-sdk --registry=https://npm.pkg.github.com
            ```

            #### Rust
            ```toml
            # 从 crates.io
            [dependencies]
            tempmail-sdk = "${{ steps.version.outputs.VERSION }}"

            # 从 GitHub
            [dependencies]
            tempmail-sdk = { git = "https://github.com/XxxXTeam/tempmail-sdk", tag = "${{ steps.version.outputs.VERSION }}", subdirectory = "sdk/rust" }
            ```

            #### Python
            ```bash
            # 从 PyPI 安装
            pip install tempemail-sdk
            # 从 GitHub Release 安装 wheel
            pip install https://github.com/XxxXTeam/tempmail-sdk/releases/download/${{ steps.version.outputs.VERSION }}/tempemail_sdk-${GITHUB_REF#refs/tags/v}-py3-none-any.whl
            ```

            #### PHP
            ```bash
            # 未发布到 Packagist（SDK 位于 monorepo 子目录 sdk/php）。
            # 从下方 Assets 下载 tempmail-sdk-php-*.zip，解压后引入 vendor/autoload.php
            ```

            #### C# (.NET)
            ```bash
            dotnet add package XxxXTeam.TempMail
            ```

            #### Ruby
            ```bash
            gem install tempmail_sdk
            ```

            #### Java (Maven)
            ```xml
            <dependency>
              <groupId>io.github.xxxxteam</groupId>
              <artifactId>tempmail-sdk</artifactId>
              <version>${{ needs.release-meta.outputs.version }}</version>
            </dependency>
            ```

            #### Kotlin (Gradle)
            ```kotlin
            dependencies {
                implementation("io.github.xxxxteam:tempmail-sdk:${{ needs.release-meta.outputs.version }}")
            }
            ```

            #### C SDK
            从下方 Assets 下载对应平台的 zip 包，解压即可使用。

            ### 预编译二进制 / 构建产物

            | 包名 | 说明 |
            |------|------|
            | `tempemail_sdk-*-py3-none-any.whl` | Python wheel 包 |
            | `XxxXTeam.TempMail.*.nupkg` | C# NuGet 包 |
            | `tempmail_sdk-*.gem` | Ruby gem 包 |
            | `tempmail-sdk-*.jar` | Java/Kotlin JAR 包 |
            | `tempmail-sdk-php-*.zip` | PHP Composer 包 |
            | `tempmail-example-linux-amd64.zip` | Go 示例 - Linux x64 |
            | `tempmail-example-linux-arm64.zip` | Go 示例 - Linux ARM64 |
            | `tempmail-example-darwin-amd64.zip` | Go 示例 - macOS x64 |
            | `tempmail-example-darwin-arm64.zip` | Go 示例 - macOS ARM64 |
            | `tempmail-example-windows-amd64.zip` | Go 示例 - Windows x64 |
            | `tempmail-example-windows-arm64.zip` | Go 示例 - Windows ARM64 |
            | `rust-tempmail-example-*.zip` | Rust 示例 - 各平台 |
            | `c-sdk-*.zip` | C SDK 静态库 + 示例二进制 - 各平台 |

